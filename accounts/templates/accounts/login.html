{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> Киришүү</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Киришүү
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Аккаунтуңуз жокпу? <a href="{% url 'register' %}">Катталуу</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
